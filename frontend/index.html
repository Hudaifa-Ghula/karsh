<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تمت تعبئة الكرش بنجاح</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>تمت تعبئة الكرش بنجاح</h1>
            <p>حول أي صورة ببكسلات الكرش</p>
        </header>

        <main>
            <div class="canvas-container card">
                <canvas id="morphCanvas"></canvas>
                <div class="controls">
                    <input type="range" id="morphSlider" min="0" max="1" step="0.01" value="0">
                </div>
            </div>

            <div class="sidebar">
                <div class="card pulse-border">
                    <h3>Upload Source</h3>
                    <label for="fileInput" class="upload-btn">
                        <span>Choose Image</span>
                        <input type="file" id="fileInput" accept="image/*" hidden>
                    </label>
                </div>

                <div class="card">
                    <h3>Presets</h3>
                    <div id="presetList" class="preset-grid">
                        <!-- Presets injected here -->
                    </div>
                </div>

                <div class="card">
                    <h3>Settings</h3>
                    <div class="settings-group">
                        <label>Speed</label>
                        <input type="range" id="speedSlider" min="0.5" max="2.5" step="0.1" value="1">
                    </div>
                    <div class="button-group">
                        <button id="playBtn" class="primary-btn">Play</button>
                    </div>
                </div>
            </div>
        </main>

        <div id="status" class="status-bar">Ready</div>
    </div>
    <script src="script.js?v=2"></script>
</body>
</html>
